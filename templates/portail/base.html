{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}بوابة الموكلين{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #f8f9fc; }
    .portail-navbar { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
    .portail-navbar .navbar-brand { color: #fff; font-weight: 700; }
    .portail-navbar a { color: rgba(255,255,255,.85); }
    .portail-navbar a:hover { color: #fff; }
    .portail-card { background: #fff; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .portail-login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    }
    .portail-login-card { width: 100%; max-width: 440px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
