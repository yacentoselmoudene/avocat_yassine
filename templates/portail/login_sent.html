{% extends "portail/base.html" %}
{% block title %}تم إرسال الرابط{% endblock %}
{% block body %}
<div class="portail-login-wrap">
  <div class="portail-login-card">
    <div class="card portail-card">
      <div class="card-body p-5 text-center">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem"></i>
        <h4 class="mt-3">إذا كان الحساب موجودًا، فقد تم إرسال الرابط.</h4>
        <p class="text-secondary mt-2">
          تحقّق من بريدك الإلكتروني أو من رسائل واتساب الواردة.
          <br>الرابط صالح لمدة 24 ساعة.
        </p>
        <hr class="my-4">
        <a href="{% url 'cabinet:portail_login' %}" class="btn btn-outline-primary">
          <i class="bi bi-arrow-counterclockwise ms-1"></i> العودة
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
